services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: kaarigargo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kaarigargo
      POSTGRES_PASSWORD: kaarigargo
      POSTGRES_DB: kaarigargo
    ports:
      - "5432:5432"
    volumes:
      - kaarigargo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaarigargo -d kaarigargo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kaarigargo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - kaarigargo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kaarigargo_pgdata:
  kaarigargo_redisdata:
